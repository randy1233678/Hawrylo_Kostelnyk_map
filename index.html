<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гавриїл Костельник: Інтерактивна мапа</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0ede5; }
        #map { width: 100vw; height: 100vh; }
        
        .custom-popup .leaflet-popup-content-wrapper {
            background: #fff;
            border-radius: 12px;
            padding: 0;
            border: 1px solid #2c3e50;
            overflow: hidden;
        }

        .leaflet-popup-content {
            margin: 0;
            max-width: 320px;
            font-size: 14px;
        }

        /* --- НОВЕ: ПЕРЕВИЗНАЧЕННЯ ТІЛЬКИ ДЛЯ ЛЬВОВА --- */
        .leaflet-popup.lviv-popup-override .leaflet-popup-content {
            max-width: 550px !important;
            width: 550px !important;
        }

        .lviv-popup-container {
            display: flex;
            width: 100%;
            background: #fff;
        }

        .lviv-left {
            width: 220px;
            flex-shrink: 0;
            background: #f9f9f9;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .lviv-right {
            flex-grow: 1;
            padding: 15px;
        }

        .lviv-right::after {
            content: "";
            display: block;
            clear: both;
        }
        .lviv-nav-btns {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #eee;
            margin-top: auto;
        }

        .lviv-nav-btn {
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
        }

        .lviv-nav-btn:disabled {
            background: #bdc3c7;
            cursor: default;
        }
        /* ---------------------------------------------- */

        .popup-header {
            padding: 15px 15px 5px 15px;
        }

        .custom-popup h3 {
            margin: 0 0 10px;
            color: #c0392b;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .popup-photo-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            background: #f9f9f9;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .popup-photo {
            width: 100%;
            height: auto;
            aspect-ratio: 540 / 450;
            object-fit: cover;
            display: block;
        }

        .popup-photo-caption {
            font-size: 11px;
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
            padding: 8px 10px 0;
            margin: 0;
        }

        .popup-body {
            padding: 12px 15px 15px 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .popup-event {
            margin-bottom: 12px;
            padding-left: 10px;
            border-left: 3px solid #2c3e50;
        }

        .popup-event b {
            color: #2c3e50;
            display: block;
            margin-bottom: 3px;
        }

        .popup-event span {
            font-size: 12px;
            color: #7f8c8d;
        }
        
        .popup-desc {
            line-height: 1.5;
            color: #34495e;
            margin: 0 0 10px 0;
        }
        
        .popup-desc:last-child { margin-bottom: 0; }

        .popup-quote {
            font-style: italic;
            color: #2c3e50;
            background: #f4f1ec;
            padding: 8px 12px;
            border-radius: 5px;
            border-left: 3px solid #d35400;
            margin: 10px 0;
            font-size: 13px;
        }

        .country-label {
            font-size: 14px;
            font-weight: bold;
            color: #aeb6bf;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 1px 1px 2px #fff, -1px -1px 2px #fff;
        }

        .marker-content {
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, background-color 0.3s ease;
            position: relative;
        }

        .marker-wrapper.active .marker-content { transform: scale(1.3); }
        .marker-wrapper.hover .marker-content { transform: scale(1.2); }

        .marker-number {
            display: none;
            /*position: absolute; top: -10px; right: -10px; background: #e67e22;
            color: white; font-size: 10px; width: 20px; height: 20px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; border: 2px solid white; font-weight: bold;*/
        }

        /* --- НОВЕ: ПЛАШКА АВТОРІВ ЗАМІСТЬ ЛЕГЕНДИ --- */
        .authors-box {
            background: white; padding: 15px; border-radius: 10px;
            font-size: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            border-left: 4px solid #2c3e50; width: 280px;
            line-height: 1.5;
        }

        .popup-body::-webkit-scrollbar { width: 6px; }
        .popup-body::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .popup-body::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 4px; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

<script>
    const map = L.map('map', { 
        minZoom: 4, 
        maxZoom: 10,
        zoomControl: true 
    }).setView([48.0, 22.0], 5);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    map.createPane('countriesPane');
    map.getPane('countriesPane').style.zIndex = 200;

    const countries = [
        { name: "Україна", coords: [49.0, 31.0] },
        { name: "Польща", coords: [52.0, 19.3] },
        { name: "Італія", coords: [42.5, 12.5] },
        { name: "Швейцарія", coords: [46.8, 8.2] },
        { name: "Сербія", coords: [44.0, 21.0] },
        { name: "Хорватія", coords: [45.1, 15.5] },
        { name: "Росія", coords: [55.0, 38.0] }
    ];

    countries.forEach(c => {
        L.marker(c.coords, {
            icon: L.divIcon({ className: 'country-label', html: c.name }),
            interactive: false,
            pane: 'countriesPane'
        }).addTo(map);
    });

    const locations = [
        { 
            id: 1, name: "Руський Керестур", coords: [45.5631, 19.4144], icon: "fa-baby", image: "1.jpg", 
            imgCaption: "Отець Гавриїл Костельник та його дружина Елеонора. Руський Керестур, 1913 рік", 
            desc: "<p class='popup-desc'>Гавриїл Костельник народився 15 червня 1886 року в регіоні Бачка у селі Руський Керестур в родині середнього достатку. Мати – Анна (дівоче прізвище Макай) Батько Федір був гарним господарем та з 1895 по 1919 рік виконував обов’язки члена управи. У Гавриїла Костельника було двоє братів - старший Михайло та молодший Ян – а також три сестри.</p><p class='popup-desc'>Саме в Руському Керестурі минуло дитинство майбутнього священника. Там же він закінчив 6 класів початкової школи. Рідний край мав велике значення для Костельника.</p><div class='popup-quote'>«Бачко, моя Бачко!<br>У тим швеце ширим<br>Я за тобу тужим,<br>Нїґде ше не змирим» (1922 р.)</div>" 
        },
        { 
            id: 2, name: "Вінковці", coords: [45.2883, 18.8034], icon: "fa-school", image: "2.jpg", 
            imgCaption: "Місто Вінковці", 
            desc: "<p class='popup-desc'>Перші два класи гімназії Гавриїл Костельник закінчив у місті Вінковці в 1898-1900 роках. Закінчив він їх з чималим успіхом. Вінковці не відіграли важливу роль у житті Костельника самі по собі, але стали важливою проміжною ланкою у житті священника.</p>" 
        },
        { 
            id: 3, name: "Загреб", coords: [45.8150, 15.9819], icon: "fa-book", image: "3.jpg", 
            imgCaption: "Гавриїл Костельник у Загребі", 
            desc: "<p class='popup-desc'>Після двох років навчання у Вінковцях Костельник переходить в малу духовну греко-католицькій семінарію Загреба. Після її закінчення 1906 року стає студентом на Католицькому богословському факультеті Загребського університету і закінчує там І курс. Однак вже 1907 року молодий студент привертає увагу ректора греко-католицької семінарії в Загребі Діонісія Няряді і останній відправляє Костельника на богословські студії у Львів.</p><p class='popup-desc'>Саме в Загребі Костельник здобуває справді грунтовну освіту, заводить знайомства з різними людьми та починає писати перші твори - не тільки русинською, але й також хорватською і латинською мовами. Ставши секретарем літературного гуртка греко-католицької семінарії в Загребі, юнак читає багато літератури та поезії.</p>" 
        },
        { 
            id: 4, name: "Рим", coords: [41.9028, 12.4964], icon: "fa-columns", image: "4.jpg", 
            imgCaption: "Рим", 
            desc: "<p class='popup-desc'><b>1907–1911:</b> Навчання в Папській колегії «Пропаганда Фіде». Здобув вищу католицьку освіту, познайомившись із тогочасними європейськими інтелектуальними течіями.</p>" 
        },
        { 
            id: 5, name: "Фрібург", coords: [46.8065, 7.1620], icon: "fa-graduation-cap", image: "5.jpg", 
            imgCaption: "Гавриїл Костельник у Фрібурзі в 1912 році", 
            desc: "<p class='popup-desc'>З 1911 по 1913 рік Костельник працює над докторатом швейцарському університеті міста Фрібург. 1913 року Костельник успішно захищає докторат з філософії, написавши працю «De Principiis Cognitionis Fundamentalibus» (Про основні принципи розумового пізнання).</p>" 
        },
        { 
            id: 6, name: "Перемишль", coords: [49.7833, 22.7667], icon: "fa-church", image: "6.jpg",
            secondary: true, 
            imgCaption: "Гавриїл Костельник з родиною Зарицьких. Перемишль 1913 року", 
            desc: "<p class='popup-desc'>Дружина Костельника, Елеонора Амалія Єлизавета Зарицька народилася у родині професора української гімназії Северина Зарицького. Костельник одружився з нею в 1913 році. Костельник любив та цінував свою дружину. В їх родині народилося 5 дітей - доньки Святослава та Христина і сини Богдан, Іреній та Зиновій. На жаль, Святослава, яка була першою дитиною в родині померла в шестирічному віці.</p>" 
        },
        { 
            id: 7, name: "Жовква", coords: [50.0556, 23.9733], icon: "fa-scroll", image: "7.jpg",
            secondary: true, 
            imgCaption: "Перша поетична збірка Костельника, написана бачвансько-руською говіркою", 
            desc: "<p class='popup-desc'>Письменником Костельник став, ще навчаючися у 6 класі гімназії Загреба. 1904 року в Жовкві у друкарні василіян виходить друком перша книга Костельника. Це невеличка поетична збірка, видана за кошти самого автора. Вона не набула великої популярності, але привернула увагу українських інтелектуальних кіл. Зокрема, позитивну рецензію написав український етнограф Володимир Гнатюк.</p>" 
        },
        { 
            id: "8", name: "Львів", coords: [49.8397, 24.0297], icon: "fa-landmark", isHub: true
        },
        { 
            id: 9, name: "Москва", coords: [55.7558, 37.6173], icon: "fa-file-signature", image: "9.jpg", 
            imgCaption: "Москва", 
            desc: "<p class='popup-desc'><b>1945–1946:</b> Участь у складних переговорах щодо подальшої долі УГКЦ під тиском радянської влади, підготовка до псевдособору 1946 року.</p>" 
        },
        { 
            id: 10, name: "Сремські Карловці", coords: [45.2025, 19.9342], icon: "fa-cross", image: "11.jpg",
            secondary: true, 
            imgCaption: "Обкладинка Граматики бачваньско-рускей бешеди.", 
            desc: "<p class='popup-desc'>Попри переїзд до Львова, Костельник не поривав зв’язків зі своїм рідним краєм. Костельник цікавився рідною говіркою ще під час навчання в семінарії. А в 1919 році після розпаду Австро-Угорщини регіон Бачка став частиною Югославії. Політика мадяризації припинилася. 2 липня 1919 році бачванськими русаними було засноване Руске Народне Просвитне Дружство (далі – РНПД). Костельник активно підтримував звязки з членами цього товариства. Тож коли до Костельника звернулися священник Дюра Биндач і перший очільник РНПД Михал Мудри з проханням написати граматику бачвано-русинської говірки – він з радістю відгукнувся на їх прохання.  Граматика була написана і існувала в рукописі вже в 1921 році. Проте її видання затягнулося. Зрештою, в 1923 році РНПД таки видало Граматику бачваньско-рускей бешеди в Сремських Карловцях, у місцевій монастирській друкарні..</p>" 
        }
    ];

    // --- НОВИЙ ПОРЯДОК МАРШРУТУ ---
    // Руський Керестур(0) – Винковці(1) – Загреб(2) – Львів(7) – Фрібург(4) – Львів(7) – Рим(3) – Львів(7) – Москва(8) – Львів(7)
    const pathOrder = [0, 1, 2, 7, 4, 7, 3, 7, 8, 7];

    function getBezierPoints(start, end, bend = 0.25) {
        const pts = [];
        const midLat = (start[0] + end[0]) / 2 + (end[1] - start[1]) * bend;
        const midLng = (start[1] + end[1]) / 2 - (end[0] - start[0]) * bend;
        const cp = [midLat, midLng];

        for (let t = 0; t <= 1; t += 0.05) {
            const lat = (1 - t) * (1 - t) * start[0] + 2 * (1 - t) * t * cp[0] + t * t * end[0];
            const lng = (1 - t) * (1 - t) * start[1] + 2 * (1 - t) * t * cp[1] + t * t * end[1];
            pts.push([lat, lng]);
        }
        pts.push([end[0], end[1]]);
        return pts;
    }

    for (let i = 0; i < pathOrder.length - 1; i++) {
        const start = locations[pathOrder[i]].coords;
        const end = locations[pathOrder[i+1]].coords;
        
        // Використовуємо сталий вигин 0.25. 
        // Математика побудована так, що лінія "туди" і "назад" будуть автоматично вигинатися в різні боки.
        const curvePoints = getBezierPoints(start, end, 0.25);
        const line = L.polyline(curvePoints, { color: '#2c3e50', weight: 3, opacity: 0.5 }).addTo(map);

        L.polylineDecorator(line, {
            patterns: [{
                offset: '55%', repeat: 0,
                symbol: L.Symbol.arrowHead({
                    pixelSize: 14,
                    polygon: true,
                    pathOptions: { color: '#2c3e50', fillOpacity: 1, stroke: false }
                })
            }]
        }).addTo(map);
    }

    const getColor = (loc) => {
        if (loc.isHub) return '#c0392b';
        if (loc.name === "Рим") return '#8e44ad';
        return '#2c3e50';
    };

    // --- ДАНІ ТА ЛОГІКА ДЛЯ ЛЬВОВА ---
    const lvivSlides = [
        { 
            date: "1920–1944", 
            title: "Період розквіту", 
            text: "Професор Богословської академії, видатний проповідник у Соборі св. Юра, редактор журналу «Нива» текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст текст.",
            img: "8.jpg"
        },
        { 
            date: "1948", 
            title: "Трагічна загибель", 
            text: "Убитий біля Преображенської церкви за досі нез'ясованих обставин після повернення з фатального відрядження.",
            img: "8.jpg" // Заміни на потрібну назву файлу, якщо є (наприклад, 10.jpg)
        }
    ];
    let currentLvivSlide = 0;
    window.lvivMarkerRef = null;

    function getLvivHTML() {
        const s = lvivSlides[currentLvivSlide];
        return `
            <div class="custom-popup">
                <div class="popup-header" style="border-bottom: 1px solid #eee; margin-bottom: 0;">
                    <h3 style="margin: 0; padding-bottom: 5px; border: none;">Львів</h3>
                </div>
                <div class="lviv-popup-container">
                    <div class="lviv-left">
                        <img src="${s.img}" style="width: 200px; height: auto; float: left; margin: 0 15px 10px 0; object-fit: cover;" alt="Львів">
                        <div class="lviv-nav-btns">
    <button class="lviv-nav-btn" onclick="event.stopPropagation(); changeLvivSlide(-1)" ${currentLvivSlide === 0 ? 'disabled' : ''}>
        <i class="fa-solid fa-chevron-left"></i>
    </button>

    <span style="font-size: 13px; font-weight: bold; color: #2c3e50;">
        ${currentLvivSlide + 1} / ${lvivSlides.length}
    </span>

    <button class="lviv-nav-btn" onclick="event.stopPropagation(); changeLvivSlide(1)" ${currentLvivSlide === lvivSlides.length - 1 ? 'disabled' : ''}>
        <i class="fa-solid fa-chevron-right"></i>
    </button>
</div>
                    </div>
                    <div class="lviv-right">
                        <div class="popup-event" style="margin-bottom: 0; border-left: 3px solid #c0392b;">
                            <span>${s.date}</span>
                            <b style="color: #c0392b; font-size: 15px; margin-top: 5px;">${s.title}</b>
                            <p class="popup-desc" style="margin-top: 10px;">${s.text}</p>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    window.changeLvivSlide = function(dir) {
        currentLvivSlide += dir;
        if (window.lvivMarkerRef) {
            window.lvivMarkerRef.getPopup().setContent(getLvivHTML());
        }
    };

    let activeMarker = null;

    locations.forEach((loc, idx) => {
        const isSecondary = loc.secondary;

const customIcon = L.divIcon({
    className: 'marker-wrapper',
    html: `<div class="marker-content" style="
                background-color:${isSecondary ? '#95a5a6' : getColor(loc)};
                width:${isSecondary ? '26px' : '36px'};
                height:${isSecondary ? '26px' : '36px'};
            ">
           <i class="fa-solid ${loc.icon}" style="font-size:${isSecondary ? '12px' : '16px'}"></i>
           ${!isSecondary ? `<div class="marker-number">${idx + 1}</div>` : ''}
           </div>`,
    iconSize: isSecondary ? [26, 26] : [36, 36],
    iconAnchor: isSecondary ? [13, 13] : [18, 18]
});

        const marker = L.marker(loc.coords, { icon: customIcon }).addTo(map);

        if (loc.isHub) {
            window.lvivMarkerRef = marker;
            // Додаємо клас lviv-popup-override для розширення вікна
            marker.bindPopup(getLvivHTML(), { autoPan: false, className: 'lviv-popup-override' });
        } else {
            let content = `
                <div class="custom-popup">
                    <div class="popup-header">
                        <h3>${loc.name}</h3>
                    </div>
                    <div class="popup-photo-container">
                        <img src="${loc.image}" class="popup-photo" alt="${loc.name}">
                        <p class="popup-photo-caption">${loc.imgCaption}</p>
                    </div>
                    <div class="popup-body">
                        ${loc.desc}
                    </div>
                </div>`;
            marker.bindPopup(content, { autoPan: false });
        }

        marker.on('click', () => {
            if (activeMarker) activeMarker.classList.remove('active');
            activeMarker = marker.getElement();
            activeMarker.classList.add('active');
            
            const targetZoom = 8;
            const projectedCenter = map.project(loc.coords, targetZoom);
            projectedCenter.y -= 260; 
            const newCenter = map.unproject(projectedCenter, targetZoom);
            
            map.flyTo(newCenter, targetZoom, { duration: 1.5 });
        });

        marker.on('mouseover', () => marker.getElement().classList.add('hover'));
        marker.on('mouseout', () => marker.getElement().classList.remove('hover'));
    });

    map.on('popupclose', () => {
        if (activeMarker) activeMarker.classList.remove('active');
        map.flyTo([48.0, 22.0], 5, { duration: 1.5 });
    });

    // --- НОВА ПЛАШКА ЗАМІСТЬ ЛЕГЕНДИ ---
    const authorInfo = L.control({ position: "bottomright" });
    authorInfo.onAdd = function () {
        const div = L.DomUtil.create("div", "authors-box");
        div.innerHTML = `
    <b style="color: #2c3e50;">Автори:</b><br>
    <span style="color: #7f8c8d;">Розробник: Стаценко Антон</span><br>
    <span style="color: #7f8c8d;">Текст та дослідження: Стаценко Данило</span>
`;
        return div;
    };
    authorInfo.addTo(map);

</script>
</body>
</html>
